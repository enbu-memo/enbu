<body>
    <div id="header-include"></div>
    <script>
        // header.htmlを読み込んで挿入し、ヘッダー内のスクリプトも再実行
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                const headerDiv = document.getElementById('header-include');
                headerDiv.innerHTML = data;
                // ヘッダー内のスクリプトを再実行
                const scripts = headerDiv.querySelectorAll('script');
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    document.body.appendChild(newScript);
                });
            });
            fetch('copyright.html')
                .then(res => res.text())
                .then(data => {
                    const el = document.getElementById('copyright-include');
                    if (el) el.innerHTML = data;
                });
    </script>

    <div id="copyright-include"></div>
    <button id="backToTop" title="一番上に戻る">↑</button>
    <script>
    // 一番上に戻るボタンの表示・動作
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 200) {
            backToTop.style.display = 'block';
        } else {
            backToTop.style.display = 'none';
        }
    });
    backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    const excelPath = 'db/raid- statistics.xlsx';
    let sheetDateMap = {};

    // Excelのhistoryシートを取得し、シート名と日付のマップ・最新シート名を返す
    function getSheetInfo(json) {
        const sheetNames = json.map(row => row[0]).filter(name => !!name);
        const dateMap = {};
        sheetNames.forEach(name => {
            const row = json.find(r => r[0] === name);
            dateMap[name] = row?.[1] ?? '';
        });
        let latestSheet = sheetNames[0] ?? '';
        let latestDate = dateMap[latestSheet] ?? '';
        sheetNames.forEach(name => {
            const dateStr = dateMap[name];
            if (dateStr && (!latestDate || new Date(dateStr) > new Date(latestDate))) {
                latestSheet = name;
                latestDate = dateStr;
            }
        });
        return { sheetNames, dateMap, latestSheet };
    }

    // ドロップダウンと集計日表示を生成
    function createDropdown(sheetNames, dateMap, selectedSheet) {
        let html = '<label for="sheet-select"></label>';
        html += '<select id="sheet-select" style="font-size:1.1em;">';
        sheetNames.forEach(name => {
            const selected = name === selectedSheet ? ' selected' : '';
            html += `<option value="${name}"${selected}>${name}</option>`;
        });
        html += '</select>';
        const selectedDate = dateMap[selectedSheet] ?? '';
        html += `<span id="sheet-date" style="font-size:1em;color:#222;">集計日: ${selectedDate}</span>`;
        return html;
    }

    // テーブル描画
    function renderTable(selectedSheet) {
        fetch(excelPath)
            .then(res => res.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(new Uint8Array(data), {type: 'array'});
                const sheet = workbook.Sheets[selectedSheet];
                if (!sheet) {
                    document.getElementById('output-raid').innerHTML = `<p style="color:red">シート『${selectedSheet}』が見つかりません。</p>`;
                    return;
                }
                const json = XLSX.utils.sheet_to_json(sheet, {header:1});
                let html = '';
                const colPairs = [ [0,1], [2,3], [4,5] ];
                for(const pair of colPairs) {
                    const [colA, colB] = pair;
                    const dataArr = [];
                    let headerValue = Number(json[0]?.[colB]);
                    if (!json[0] || headerValue == null || isNaN(headerValue)) headerValue = 0;
                    for(let i=1; i<json.length; i++) {
                        const row = json[i];
                        const cell = row?.[colA] ?? '';
                        if (!cell) continue;
                        const filename = `${cell}.png`;
                        const value = Number(row?.[colB]) || 0;
                        const percent = headerValue ? Math.round((value / headerValue) * 100) : 0;
                        dataArr.push(`<td data-imgname="${cell}"><img src="img/taisho/${filename}" alt="${filename}"><br><span style="font-weight:bold;">${percent}%</span></td>`);
                    }
                    const headerName = json[0]?.[colA] ?? '';
                    const headerCount = headerValue > 0 ? `(${headerValue}/100人)` : '<span style="color:red">データなし</span>';
                    html += `<table class="excel-table" style="width:auto;margin-bottom:1em;">`;
                    html += `<tr><th colspan="6" style="text-align:center;font-weight:bold;">${headerName} <span>${headerCount}</span></th></tr>`;
                    for(let j=0; j<dataArr.length; j+=6) {
                        html += '<tr>';
                        for(let k=0; k<6; k++) {
                            html += dataArr[j+k] ?? '<td></td>';
                        }
                        html += '</tr>';
                    }
                    if(dataArr.length === 0) {
                        html += '<tr>';
                        for(let k=0; k<6; k++) html += '<td></td>';
                        html += '</tr>';
                    }
                    html += '</table>';
                }
                // ドロップダウンを選択状態で再生成
                const sheetNames = Object.keys(sheetDateMap);
                const selectBox = createDropdown(sheetNames, sheetDateMap, selectedSheet);
                document.getElementById('output-raid').innerHTML = selectBox + html;
            })
            .catch(err => {
                document.getElementById('output-raid').innerHTML = `<p style=\"color:red\">シート『${selectedSheet}』の読み込みに失敗しました。</p>`;
            });
    }

    // 初期化
    function initRaidStatistics() {
        fetch(excelPath)
            .then(res => res.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(new Uint8Array(data), {type: 'array'});
                const sheet = workbook.Sheets['history'];
                if (!sheet) {
                    document.getElementById('output-raid').innerHTML = '<p style="color:red">指定シートが見つかりません。</p>';
                    return;
                }
                const json = XLSX.utils.sheet_to_json(sheet, {header:1});
                const { sheetNames, dateMap, latestSheet } = getSheetInfo(json);
                sheetDateMap = dateMap;
                const selectHtml = createDropdown(sheetNames, dateMap, latestSheet);
                document.getElementById('output-raid').innerHTML = selectHtml;
                renderTable(latestSheet);
            })
            .catch(err => {
                document.getElementById('output-raid').innerHTML = '<p style="color:red">Excelファイルの読み込みに失敗しました。</p>';
            });
    }

    // ドロップダウン選択時
    document.addEventListener('change', function(e) {
        if(e.target.id === 'sheet-select') {
            const selectedSheet = e.target.value;
            const date = sheetDateMap[selectedSheet] ?? '';
            const dateSpan = document.getElementById('sheet-date');
            if (dateSpan) dateSpan.textContent = `集計日時: ${date}`;
            renderTable(selectedSheet);
        }
    });

    // ページロード時初期化
    initRaidStatistics();
    </script>
</html>
